{% extends 'layout.html' %}

{% block title %}Edit {{ show.title }}{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width:600px;">

    <h2 class="mb-4">Edit: {{ show.title }}</h2>

    <form id="edit-form">
        <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" id="title" class="form-control" value="{{ show.title }}">
            <div class="invalid-feedback" id="title-error"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Network *</label>
            <input type="text" id="network" class="form-control" value="{{ show.network }}">
            <div class="invalid-feedback" id="network-error"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Host *</label>
            <input type="text" id="host" class="form-control" value="{{ show.host }}">
            <div class="invalid-feedback" id="host-error"></div>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Season *</label>
                <input type="number" id="season" class="form-control" value="{{ show.season }}">
                <div class="invalid-feedback" id="season-error"></div>
            </div>
            <div class="col mb-3">
                <label class="form-label">Year *</label>
                <input type="number" id="year" class="form-control" value="{{ show.year }}">
                <div class="invalid-feedback" id="year-error"></div>
            </div>
            <div class="col mb-3">
                <label class="form-label">Rating (1-5) *</label>
                <input type="number" id="rating" class="form-control" min="1" max="5" value="{{ show.rating }}">
                <div class="invalid-feedback" id="rating-error"></div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Genre <small class="text-muted">(comma separated)</small></label>
            <input type="text" id="genre" class="form-control" value="{{ show.genre | join(', ') }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Summary *</label>
            <textarea id="summary" class="form-control" rows="3">{{ show.summary }}</textarea>
            <div class="invalid-feedback" id="summary-error"></div>
        </div>
        <div class="mb-4">
            <label class="form-label">Image URL</label>
            <input type="text" id="image_url" class="form-control" value="{{ show.image.url }}">
        </div>
        <div class="d-flex gap-2">
            <button type="button" id="submit-btn" class="btn btn-dark">Submit</button>
            <button type="button" id="discard-btn" class="btn btn-outline-secondary">Discard Changes</button>
        </div>
    </form>

</div>
{% endblock %}

{% block scripts %}
<script>
    // pass show id from server to JS
    const showId = {{ show.id }};

    // submit button - save data with $.ajax (from lecture)
    $('#submit-btn').on('click', function() {

        // clear previous errors
        $('.form-control').removeClass('is-invalid');

        // store values in a javascript object
        var showObject = {
            title: $('#title').val(),
            network: $('#network').val(),
            host: $('#host').val(),
            season: $('#season').val(),
            year: $('#year').val(),
            rating: $('#rating').val(),
            genre: $('#genre').val(),
            summary: $('#summary').val(),
            image_url: $('#image_url').val()
        };

        // use $.ajax to POST to the server
        $.ajax({
            type: 'POST',
            url: '/edit_show/' + showId,
            data: JSON.stringify(showObject),
            dataType: 'json',
            contentType: 'application/json; charset=utf-8',
            success: function(result) {
                // redirect to show page after saving
                window.location.href = '/show/' + showId;
            },
            error: function(request, status, error) {
                var errors = request.responseJSON.errors;
                Object.keys(errors).forEach(function(field) {
                    $('#' + field).addClass('is-invalid');
                    $('#' + field + '-error').text(errors[field]);
                });
            }
        });
    });

    // discard button - confirm before leaving
    $('#discard-btn').on('click', function() {
        if (confirm('Are you sure you want to discard your changes?')) {
            window.location.href = '/show/' + showId;
        }
    });
</script>
{% endblock %}
